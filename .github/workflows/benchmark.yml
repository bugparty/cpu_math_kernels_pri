name: Benchmarks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [gemm, dgetrf, ml_kernels]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          build-essential \
          cmake \
          libopenmpi-dev \
          openmpi-bin \
          libopenblas-dev \
          liblapack-dev \
          liblapacke-dev \
          intel-mkl
    
    - name: Configure CMake
      run: |
        echo "CPU Information:"
        cat /proc/cpuinfo | grep 'model name' | uniq
        echo "Supported instruction sets (AVX2/AVX512):"
        cat /proc/cpuinfo | grep -E 'avx2|avx512' | uniq
        mkdir -p build
        cd build

        if cat /proc/cpuinfo | grep -q avx512; then
            echo "AVX512 is supported. Using AVX512 flags."
            ARCH_FLAGS="-mavx512f;-mavx512dq;-mavx512vl;-mfma"
        else
            echo "AVX512 is NOT supported. Using AVX2 flags."
            ARCH_FLAGS="-mavx2;-mfma"
        fi

        cmake .. \
          -DBUILD_HW1=ON \
          -DBUILD_HW2=ON \
          -DBUILD_HW3=OFF \
          -DBUILD_ML_KERNELS=ON \
          "-DARCH_FLAGS=${ARCH_FLAGS}" \
          -DGEMM_MKL_ROOT=/usr
    
    - name: Build project
      run: |
        cd build
        if [ "${{ matrix.target }}" = "gemm" ]; then
          make gemm_bench_all -j$(nproc)
        elif [ "${{ matrix.target }}" = "dgetrf" ]; then
          make dgetrf_bench_all -j$(nproc)
        elif [ "${{ matrix.target }}" = "ml_kernels" ]; then
          make ml_kernel_bench -j$(nproc)
        fi
    
    - name: Run benchmarks
      run: |
        mkdir -p benchmark_results
        export DISABLE_CPU_BINDING=1
        if [ "${{ matrix.target }}" = "gemm" ]; then
          ./build/gemm/gemm_bench_all --iters 3 --warmup 1 --sizes 96,480,960,1920 > benchmark_results/gemm_bench_all.log
        elif [ "${{ matrix.target }}" = "dgetrf" ]; then
          ./build/dgetrf/dgetrf_bench_all --iters 3 --warmup 1 --sizes 96,480,960,1920 > benchmark_results/dgetrf_bench_all.log
        elif [ "${{ matrix.target }}" = "ml_kernels" ]; then
          ./build/ml_kernels/ml_kernel_bench --iters 3 --warmup 1 --sizes 1638400,6553600,26214400,104857600 > benchmark_results/ml_kernel_bench.log
        fi
      timeout-minutes: 120
      continue-on-error: true
    
    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ matrix.target }}
        path: benchmark_results/
        retention-days: 30

  summary:
    needs: benchmark
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-results-*
          merge-multiple: true
          path: benchmark_results

      - name: Create summary
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f benchmark_results/gemm_bench_all.log ]; then
            echo "### GEMM Performance Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -120 benchmark_results/gemm_bench_all.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f benchmark_results/dgetrf_bench_all.log ]; then
            echo "### DGETRF Performance Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -120 benchmark_results/dgetrf_bench_all.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f benchmark_results/ml_kernel_bench.log ]; then
            echo "### ML Kernels Performance Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -120 benchmark_results/ml_kernel_bench.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Benchmark Commands" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "./build/gemm/gemm_bench_all --iters 3 --warmup 1 --sizes 96,480,960,1920" >> $GITHUB_STEP_SUMMARY
          echo "./build/dgetrf/dgetrf_bench_all --iters 3 --warmup 1 --sizes 96,480,960,1920" >> $GITHUB_STEP_SUMMARY
          echo "./build/ml_kernels/ml_kernel_bench --iters 3 --warmup 1 --sizes 1638400,6553600,26214400,104857600" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

name: benchmark

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
          build-essential \
          cmake \
          libopenmpi-dev \
          openmpi-bin \
          libopenblas-dev \
          liblapack-dev \
          liblapacke-dev \
          intel-mkl

    - name: Configure CMake
      run: |
        echo "CPU Information:"
        cat /proc/cpuinfo | grep 'model name' | uniq
        echo "Supported instruction sets (AVX2/AVX512):"
        cat /proc/cpuinfo | grep -E 'avx2|avx512' | uniq
        mkdir -p build
        cd build

        # Check if AVX512 is supported
        if cat /proc/cpuinfo | grep -q avx512; then
            echo "AVX512 is supported. Using AVX512 flags."
            ARCH_FLAGS="-mavx512f;-mavx512dq;-mavx512vl;-mfma"
        else
            echo "AVX512 is NOT supported. Using AVX2 flags."
            ARCH_FLAGS="-mavx2;-mfma"
        fi

        cmake .. \
          -DBUILD_HW1=ON \
          -DBUILD_HW2=ON \
          -DBUILD_HW3=OFF \
          -DBUILD_ML_KERNELS=ON \
          "-DARCH_FLAGS=${ARCH_FLAGS}" \
          -DGEMM_MKL_ROOT=/usr

    - name: Build project
      run: |
        cd build
        make gemm_bench_all dgetrf_bench_all ml_kernel_bench transpose_bench -j$(nproc)

    - name: Verify build
      run: |
        ls -lh build/gemm/gemm_bench_all
        ./build/gemm/gemm_bench_all --iters 1 --warmup 0 --sizes 96
        ls -lh build/dgetrf/dgetrf_bench_all
        ./build/dgetrf/dgetrf_bench_all --iters 1 --warmup 0 --sizes 96
        ls -lh build/ml_kernels/ml_kernel_bench
        DISABLE_CPU_BINDING=1 ./build/ml_kernels/ml_kernel_bench --iters 1 --warmup 0 --sizes 96
        ls -lh build/gemm/transpose_bench
        ./build/gemm/transpose_bench --iters 1 --warmup 0 --sizes 96

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: bench-all-executables
        path: |
          build/gemm/gemm_bench_all
          build/dgetrf/dgetrf_bench_all
          build/ml_kernels/ml_kernel_bench
          build/gemm/transpose_bench
        retention-days: 7

  benchmark:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        bench:
          - name: gemm_bench_all
            command: ./build/gemm/gemm_bench_all --iters 3 --warmup 1 --sizes 96,480,960,1920
          - name: dgetrf_bench_all
            command: ./build/dgetrf/dgetrf_bench_all --iters 3 --warmup 1 --sizes 96,480,960,1920
          - name: ml_kernel_bench
            command: DISABLE_CPU_BINDING=1 ./build/ml_kernels/ml_kernel_bench --iters 3 --warmup 1 --sizes 96,480,960,1920
          - name: transpose_bench
            command: ./build/gemm/transpose_bench --iters 3 --warmup 1 --sizes 96,480,960,1920

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: bench-all-executables
        path: .

    - name: Ensure executables are runnable
      run: |
        chmod +x build/gemm/gemm_bench_all
        chmod +x build/dgetrf/dgetrf_bench_all
        chmod +x build/ml_kernels/ml_kernel_bench
        chmod +x build/gemm/transpose_bench

    - name: Run benchmark ${{ matrix.bench.name }}
      run: |
        mkdir -p benchmark_results
        echo "Running: ${{ matrix.bench.command }}"
        bash -c '${{ matrix.bench.command }}' > benchmark_results/${{ matrix.bench.name }}.log
      timeout-minutes: 60
      continue-on-error: true

    - name: Upload benchmark result ${{ matrix.bench.name }}
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-result-${{ matrix.bench.name }}
        path: benchmark_results/${{ matrix.bench.name }}.log
        retention-days: 30

  summary:
    runs-on: ubuntu-latest
    needs: benchmark
    if: always()

    steps:
    - name: Download benchmark artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: benchmark-result-*
        merge-multiple: true
        path: benchmark_results

    - name: Create summary
      run: |
        echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Parallel matrix jobs: gemm/dgetrf/ml_kernels/transpose" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ -f benchmark_results/gemm_bench_all.log ]; then
          echo "### GEMM Performance Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -120 benchmark_results/gemm_bench_all.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

        if [ -f benchmark_results/dgetrf_bench_all.log ]; then
          echo "### DGETRF Performance Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -120 benchmark_results/dgetrf_bench_all.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

        if [ -f benchmark_results/ml_kernel_bench.log ]; then
          echo "### ML Kernels Performance Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -120 benchmark_results/ml_kernel_bench.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

        if [ -f benchmark_results/transpose_bench.log ]; then
          echo "### Transpose Sub-Benchmark Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -180 benchmark_results/transpose_bench.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Benchmark Commands" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "./build/gemm/gemm_bench_all --iters 3 --warmup 1 --sizes 96,480,960,1920" >> $GITHUB_STEP_SUMMARY
        echo "./build/dgetrf/dgetrf_bench_all --iters 3 --warmup 1 --sizes 96,480,960,1920" >> $GITHUB_STEP_SUMMARY
        echo "DISABLE_CPU_BINDING=1 ./build/ml_kernels/ml_kernel_bench --iters 3 --warmup 1 --sizes 96,480,960,1920" >> $GITHUB_STEP_SUMMARY
        echo "./build/gemm/transpose_bench --iters 3 --warmup 1 --sizes 96,480,960,1920" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Upload combined benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark_results/
        retention-days: 30
